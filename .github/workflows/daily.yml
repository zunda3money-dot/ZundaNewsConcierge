name: Daily News Digest

# 毎日 2 回配信:
#   - 朝のレポート 06:13 JST = 21:13 UTC (前日)
#   - 夕方のレポート 19:13 JST = 10:13 UTC
#
# ⚠️ 「:00 ちょうど」を避けて :13 にしている理由:
#   GitHub Actions の cron は世界中の :00 ジョブが殺到するため、
#   無料枠では遅延 (数時間) または完全 skip されることがある。
#   公式が「混雑時間帯を避けて」と推奨。
#   https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
#
# 配信時刻を変えたい場合は cron 文字列を編集してください。
# UTC 時刻の検算は https://crontab.guru/ が便利です。
on:
  schedule:
    - cron: '13 21 * * *'   # 朝 06:13 JST
    - cron: '13 10 * * *'   # 夕 19:13 JST
  workflow_dispatch:  # 手動実行ボタン (GitHub UI から)

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    # Gemini が一時的に 503 を返した時、リトライ (90s + 300s + 600s = 約 17 分)
    # を完走できるよう余裕を持たせる。GitHub Actions 無料枠は月 2000 分なので
    # 1 日 2 回 × 30 日 × 20 分 = 1200 分で十分収まる。
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        env:
          # AI プロバイダ (どちらか片方あれば動く)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 配信チャネル (どちらか片方あれば動く、両方あれば両方に届く)
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # email_to は config.yaml に書いても OK だが、Secret 化すれば
          # config.yaml を編集せずに済む (QUICK_START 推奨方式)
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          PYTHONUNBUFFERED: '1'
        run: python -m scripts.run
