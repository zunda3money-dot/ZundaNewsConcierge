# ============================================
# 5 テーマ汎用サンプル config
# ============================================
# ずんだもんの三刀流マネーラボ向け一般推奨設定。
# 5 つの代表的な投資テーマをカバーし、多くの個人投資家にとって
# 「最低限カスタマイズなしで実用的」な内容を目指しています。
#
# カバーするテーマ:
#   1. 全世界株式 (オール・カントリー / VT / MSCI ACWI)
#   2. S&P 500 (米国大型株インデックス)
#   3. 金 (Gold / コモディティ)
#   4. GAFA (Google / Apple / Meta / Amazon)
#   5. 日経平均 (日本株 / TOPIX)
#
# このサンプルをそのまま使っても良いし、自分の好みに合わせて
# holdings / interests を編集してもOK。
# ============================================

mode: hybrid              # beginner / expert / hybrid (推奨)
delivery_time_jst: "06:00, 19:00"
ai_provider: gemini

# Gmail で受け取りたい人だけ自分のメアドを入れる (空欄なら Discord のみ)
email_to: ""

# --------------------------------------------
# 保有銘柄: GAFA (4 銘柄) + 金 ETF + 日本株代表
# --------------------------------------------
# 自分が実際に保有している銘柄に書き換えてください。
# 個別株を持っていない場合 (積立投信のみ) は、構成銘柄ベースで書く
# (例: S&P500 投信 → AAPL, MSFT, NVDA 等の主要構成銘柄)。
holdings:
  # GAFA
  - ticker: GOOGL
    name: アルファベット (Google)
  - ticker: AAPL
    name: アップル
  - ticker: META
    name: メタ・プラットフォームズ
  - ticker: AMZN
    name: アマゾン

  # 金 ETF
  - ticker: GLD
    name: SPDR ゴールド・シェア
  # 国内なら以下も検討:
  # - ticker: 1540.T
  #   name: 純金上場信託

  # 日経平均代表 (高知名度・高流動性銘柄)
  - ticker: 7203.T
    name: トヨタ自動車
  - ticker: 6758.T
    name: ソニーグループ

# --------------------------------------------
# 興味分野: 5 テーマのキーワード + マクロ
# --------------------------------------------
interests:
  # ① 全世界株式
  - オール・カントリー
  - 全世界株式
  - MSCI ACWI

  # ② S&P 500
  - S&P500
  - 米国株
  - NASDAQ

  # ③ 金 (コモディティ)
  - 金
  - ゴールド
  - コモディティ

  # ④ GAFA / メガテック
  - GAFA
  - メガテック
  - AI
  - 半導体

  # ⑤ 日経平均 / 日本株
  - 日経平均
  - 日本株
  - TOPIX
  - 円安
  - 日銀

  # マクロ (制度・金融政策)
  - 新NISA
  - つみたてNISA
  - FRB
  - 利下げ

# --------------------------------------------
# 避けたいトピック
# --------------------------------------------
exclude:
  - 仮想通貨
  - ビットコイン
  - IPO

# --------------------------------------------
# 配信記事数
# --------------------------------------------
limits:
  top_count: 3
  notable_count: 7

# --------------------------------------------
# 🎯 買い増しシグナル (押し目買い通知の例)
# --------------------------------------------
# ⚠️ これは投資助言ではなく、「冷静なときに自分で決めたルール」が
#   満たされたことを通知する機能です。
#   下記の値は **例示** なので、自分のリスク許容度・投資方針に
#   合わせて書き換えてください。空配列 [] にすれば機能オフ。
buy_signals:
  - ticker: GOOGL
    target_below: 150.0
    note: "押し目買いライン (例)"
  - ticker: GLD
    target_below: 220.0
    note: "金 ETF 押し目 (例)"
  # - ticker: 7203.T
  #   target_below: 2500
  #   note: "トヨタ押し目 (例)"

# --------------------------------------------
# 上級者向け調整 (通常はいじらなくてOK)
# --------------------------------------------
advanced:
  score_threshold_top: 7        # この点以上で「必読」セクション
  score_threshold_notable: 5    # この点以上で「その他注目」
  lookback_hours: 24            # 何時間前までの記事を対象にするか
